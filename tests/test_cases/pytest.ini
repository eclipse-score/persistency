[pytest]
addopts = -v
testpaths = tests
pythonpath = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

markers =
        cpp
        rust
        PartiallyVerifies
        FullyVerifies
        Description
        TestType
        DerivationTechnique

; Additional environment variables
env = D:RUST_BACKTRACE = 1
